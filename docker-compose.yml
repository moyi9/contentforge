version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./vaults:/app/vaults
    environment:
      - DATABASE_URL=sqlite:///./data/contentforge.db
      - CHROMA_PERSIST_DIR=./data/chroma
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
